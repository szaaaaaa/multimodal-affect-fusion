# ─────────────────────────────────────────────────────────
# Phase 2: Temporal Modeling + Fusion Improvements
# 阶段2：时序建模改进 + 融合机制改进
#
# 基于 Phase 1 最佳标签方案，测试 TCN 和门控融合。
# 先跑多模态组合（融合改进只对多模态有意义）。
#
# 前置步骤：
#   1. Phase 1 完成，确认最佳标签（更新下方 labels_seq_path）
#   2. 实现 TCN 组件: src/models/components/temporal_conv.py
#   3. 实现门控融合: src/models/fusions/gated.py
#   4. runner.py 中集成 temporal_conv 配置（编码器后、融合前）
#
# Usage:
#   python scripts/run_experiment.py \
#       --sweep configs/sweeps/improvement_phase2_temporal.yaml \
#       --data_root /content/drive/MyDrive/AmuCS_experiment/features/aligned \
#       --labels_root /content/drive/MyDrive/AmuCS_experiment/labels \
#       --splits_root /content/drive/MyDrive/AmuCS_experiment/splits \
#       --runs_root runs/improvement_phase2
# ─────────────────────────────────────────────────────────

seeds: [0, 1, 2]

modalities:
  - [video, km]
  - [video, telem]
  - [km, telem]
  - [video, km, telem]

shared:
  data:
    data_root: features/aligned
    split_path: splits/session_tvt.json
    seq_len: 600
    train_stride: 300
    val_stride: 300
    test_stride: 300
    normalize: false
    num_workers: 12
  model:
    d_model: 512
    encoders:
      video: {name: resnet2d, feature_dim: 768, dropout: 0.1, temporal_pool: none}
      km:    {name: stat, feature_dim: 25}
      telem: {name: stat_pool, feature_dim: 109}
    # LFT baseline（用于 TCN 消融 — 只改时序，不改融合）
    fusion_lft:
      name: lft
      nhead: 8
      num_layers: 2
      dim_feedforward: 512
      dropout: 0.1
      max_seq_len: 2000
      pos_encoding_type: sinusoidal
      pooling: mean
      input_token_merge: linear
      temporal_merge: none
    # 门控融合
    fusion_gated:
      name: gated
      d_model: 512
      dropout: 0.1
  train:
    optimizer: {name: adamw, lr: 5.0e-05, weight_decay: 0.01}
    batch_size: 256
    epochs: 40
    modality_dropout: 0.0
    ckpt_every_batches: 100
    compile: true

# ── 公共 multitask 模板 ──────────────────────────────────
# NOTE: 将 labels_seq_path 替换为 Phase 1 最佳标签
_task_base: &task_base
  task_type: multitask
  data:
    name: amucs_seq_multitask
    labels_seq_path: labels/arousal_reg_trend_seq.json  # ← Phase1最佳标签后更新此行
    task_names: [arousal, trend]
    task_label_dtypes: {arousal: float, trend: long}
    normalize: true
    num_workers: 16
  model:
    head:
      name: multitask_mixed_seq
      task_heads:
        arousal: {type: regression, hidden_dim: 128, out_dim: 1, dropout: 0.1}
        trend: {type: classification, hidden_dim: 128, num_classes: 3, dropout: 0.1}
  train:
    loss: multitask_mixed_seq_loss
    loss_cfg:
      task_weights: {arousal: 1.0, trend: 1.0}
      task_types: {arousal: regression, trend: classification}
    early_stopping: {metric: val_score_mixed, mode: max, patience: 5}
  eval:
    task_metrics:
      arousal: [ccc, rmse]
      trend: [macro_f1, balanced_acc]
    multitask_metric_weights: {ccc_arousal: 0.5, macro_f1_trend: 0.5}

tasks:

  # ── 对照组：LFT baseline ────────────────────────────────
  baseline_lft:
    <<: *task_base
    fusion: lft

  # ── TCN kernel=7 (1.4s) + LFT ──────────────────────────
  tcn_k7_lft:
    <<: *task_base
    fusion: lft
    model:
      temporal_conv:
        enabled: true
        kernel_size: 7
        num_layers: 2
        dropout: 0.1
      head:
        name: multitask_mixed_seq
        task_heads:
          arousal: {type: regression, hidden_dim: 128, out_dim: 1, dropout: 0.1}
          trend: {type: classification, hidden_dim: 128, num_classes: 3, dropout: 0.1}

  # ── TCN kernel=15 (3.0s) + LFT ─────────────────────────
  tcn_k15_lft:
    <<: *task_base
    fusion: lft
    model:
      temporal_conv:
        enabled: true
        kernel_size: 15
        num_layers: 2
        dropout: 0.1
      head:
        name: multitask_mixed_seq
        task_heads:
          arousal: {type: regression, hidden_dim: 128, out_dim: 1, dropout: 0.1}
          trend: {type: classification, hidden_dim: 128, num_classes: 3, dropout: 0.1}

  # ── 门控融合（无 TCN）───────────────────────────────────
  gated_fusion:
    <<: *task_base
    fusion: gated

  # ── TCN kernel=7 + 门控融合 ─────────────────────────────
  tcn_k7_gated:
    <<: *task_base
    fusion: gated
    model:
      temporal_conv:
        enabled: true
        kernel_size: 7
        num_layers: 2
        dropout: 0.1
      head:
        name: multitask_mixed_seq
        task_heads:
          arousal: {type: regression, hidden_dim: 128, out_dim: 1, dropout: 0.1}
          trend: {type: classification, hidden_dim: 128, num_classes: 3, dropout: 0.1}

  # ── 训练策略对比：modality dropout ──────────────────────
  baseline_moddrop15:
    <<: *task_base
    fusion: lft
    train:
      loss: multitask_mixed_seq_loss
      loss_cfg:
        task_weights: {arousal: 1.0, trend: 1.0}
        task_types: {arousal: regression, trend: classification}
      early_stopping: {metric: val_score_mixed, mode: max, patience: 5}
      modality_dropout: 0.15
