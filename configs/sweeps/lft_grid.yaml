# ─────────────────────────────────────────────────────────
# LFT grid sweep configuration
# LFT 网格搜索配置
# ─────────────────────────────────────────────────────────
_base_: ../base.yaml

sweep:
  method: grid
  parameters:
    data.modalities:
      - [km]
      - [video, km]
    model.encoders.km.name:
      - stat
      - cnn1d
    model.fusion.name:
      - single
      - lft
    model.fusion.num_layers:
      - 2
      - 4
    train.seed:
      - 0
      - 42
  constraints:
    - if:
        data.modalities: [km]
      then:
        model.fusion.name: single

