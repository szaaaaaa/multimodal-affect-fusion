# ─────────────────────────────────────────────────────────
# Path C 全套 state-only 三分类重跑（论文主结果 sweep）
#
# 目的：以 state-only 为统一任务，用 path B 新特征 (km_event + telem_60hz)
# 重跑 6 个 baseline fusion + 3 个 EFT 改进 (C/D/CD)，形成主结果表。
#
# 9 task × 4 modality × 2 split × 3 seed = 216 run
# 估计总时长：~20-25h (单 Colab GPU, ~5-7 min/run)
#
# F 与 CDF 未纳入：F 的 task_aware_multitask_seq head 需要 diff_tasks=[trend]，
# state-only 下无 trend，F 改进失效，CDF 退化成 CD。
#
# 断点续跑：run_experiment.py 用 find_completed_run() 检测 metrics.json，
# 已完成 run 自动跳过。Colab 断连后重新执行同命令即可续跑。
#
# Usage (Colab):
#   python -u scripts/run_experiment.py \
#     --sweep configs/sweeps/pathC_full_state_only.yaml \
#     --workers 1 \
#     --data_root   /content/drive/MyDrive/AmuCS_experiment/features/aligned \
#     --labels_root /content/drive/MyDrive/AmuCS_experiment/labels \
#     --splits_root /content/drive/MyDrive/AmuCS_experiment/splits \
#     --runs_root   /content/drive/MyDrive/AmuCS_experiment/runs/pathC_full_state_only
# ─────────────────────────────────────────────────────────

seeds: [0, 1, 2]

modalities:
  - [video, km_event, telem_60hz]
  - [video, km_event]
  - [video, telem_60hz]
  - [km_event, telem_60hz]

split_modes:
  cross_subject:
    split_path: splits/session_tvt.json
  within_subject:
    split_path: splits/within_subject.json
    temporal_split_ratios:
      train: [0.0, 0.6]
      val: [0.6, 0.8]
      test: [0.8, 1.0]

shared:
  data:
    name: amucs_seq_mixed_rate
    data_root: features/aligned
    split_path: splits/session_tvt.json
    seq_len_video_frames: 600
    train_stride_video_frames: 300
    val_stride_video_frames: 300
    test_stride_video_frames: 300
    normalize: true
    num_workers: 4
    max_events_per_window: 2048
    modality_dir_map:
      video: video_clip
      km_event: km_event
      telem_60hz: telem_60hz
  model:
    d_model: 512
    encoders:
      video:
        name: resnet2d
        feature_dim: 768
        dropout: 0.1
        temporal_pool: none
      km_event:
        name: event_token
        vocab_size: 256
        num_layers: 2
        nhead: 4
        dropout: 0.1
        target_T_v: 600
      telem_60hz:
        name: stream_60hz
        feature_dim: 23
        tcn_layers: 3
        kernel: 5
        dropout: 0.1
        downsample_stride: 12
    fusion_cma:
      name: cma
      nhead: 8
      cm_layers: 4
      sa_layers: 2
      dim_feedforward: 1024
      dropout: 0.1
      anchor_modality: video
      max_seq_len: 2000
      pos_encoding_type: sinusoidal
      pooling: mean
      temporal_merge: mean
    fusion_eft:
      name: eft
      nhead: 8
      num_layers: 4
      dim_feedforward: 1024
      dropout: 0.1
      max_seq_len: 2000
      pos_encoding_type: sinusoidal
      pooling: mean
      temporal_merge: mean
    fusion_mft:
      name: mft
      nhead: 8
      num_private_layers: 2
      num_cross_layers: 2
      dim_feedforward: 1024
      dropout: 0.1
      max_seq_len: 2000
      pos_encoding_type: sinusoidal
      pooling: mean
    fusion_lft:
      name: lft
      nhead: 8
      num_layers: 4
      dim_feedforward: 1024
      dropout: 0.1
      max_seq_len: 2000
      pos_encoding_type: sinusoidal
      pooling: mean
    fusion_late:
      name: late
      nhead: 8
      num_layers: 4
      dim_feedforward: 1024
      dropout: 0.1
      max_seq_len: 2000
      pos_encoding_type: sinusoidal
      pooling: mean
    fusion_gated:
      name: gated
      gate_hidden_dim: 256
      refine_layers: 1
      refine_nhead: 8
      refine_dim_feedforward: 1024
      dropout: 0.1
      max_seq_len: 2000
      pooling: mean
  train:
    optimizer:
      name: adamw
      lr: 5.0e-05
      weight_decay: 0.01
    scheduler:
      name: cosine
      warmup_epochs: 3
    grad_clip: 1.0
    batch_size: 32
    epochs: 40
    modality_dropout: 0.0
    ckpt_every_batches: 500
    compile: false

tasks:

  # ── 6 Baseline fusion (state-only) ────────────────────────

  cma_state_only:
    fusion: cma
    task_type: classification
    data:
      name: amucs_seq_mixed_rate
      labels_seq_path: labels/arousal_state_trend_seq.json
      label_dtype: long
      task_names: [state]
      normalize: true
      num_workers: 4
    model:
      head:
        name: multitask_seq
        task_names: [state]
        hidden_dim: 128
        num_classes: 3
        dropout: 0.1
    train:
      loss: multitask_ce_seq_masked
      loss_cfg:
        task_weights: {state: 1.0}
        label_smoothing: 0.1
      early_stopping:
        metric: val_macro_f1_state
        mode: max
        patience: 8
    eval:
      metrics: [macro_f1, balanced_acc]

  eft_state_only:
    fusion: eft
    task_type: classification
    data:
      name: amucs_seq_mixed_rate
      labels_seq_path: labels/arousal_state_trend_seq.json
      label_dtype: long
      task_names: [state]
      normalize: true
      num_workers: 4
    model:
      head:
        name: multitask_seq
        task_names: [state]
        hidden_dim: 128
        num_classes: 3
        dropout: 0.1
    train:
      loss: multitask_ce_seq_masked
      loss_cfg:
        task_weights: {state: 1.0}
        label_smoothing: 0.1
      early_stopping:
        metric: val_macro_f1_state
        mode: max
        patience: 8
    eval:
      metrics: [macro_f1, balanced_acc]

  mft_state_only:
    fusion: mft
    task_type: classification
    data:
      name: amucs_seq_mixed_rate
      labels_seq_path: labels/arousal_state_trend_seq.json
      label_dtype: long
      task_names: [state]
      normalize: true
      num_workers: 4
    model:
      head:
        name: multitask_seq
        task_names: [state]
        hidden_dim: 128
        num_classes: 3
        dropout: 0.1
    train:
      loss: multitask_ce_seq_masked
      loss_cfg:
        task_weights: {state: 1.0}
        label_smoothing: 0.1
      early_stopping:
        metric: val_macro_f1_state
        mode: max
        patience: 8
    eval:
      metrics: [macro_f1, balanced_acc]

  lft_state_only:
    fusion: lft
    task_type: classification
    data:
      name: amucs_seq_mixed_rate
      labels_seq_path: labels/arousal_state_trend_seq.json
      label_dtype: long
      task_names: [state]
      normalize: true
      num_workers: 4
    model:
      head:
        name: multitask_seq
        task_names: [state]
        hidden_dim: 128
        num_classes: 3
        dropout: 0.1
    train:
      loss: multitask_ce_seq_masked
      loss_cfg:
        task_weights: {state: 1.0}
        label_smoothing: 0.1
      early_stopping:
        metric: val_macro_f1_state
        mode: max
        patience: 8
    eval:
      metrics: [macro_f1, balanced_acc]

  late_state_only:
    fusion: late
    task_type: classification
    data:
      name: amucs_seq_mixed_rate
      labels_seq_path: labels/arousal_state_trend_seq.json
      label_dtype: long
      task_names: [state]
      normalize: true
      num_workers: 4
    model:
      head:
        name: multitask_seq
        task_names: [state]
        hidden_dim: 128
        num_classes: 3
        dropout: 0.1
    train:
      loss: multitask_ce_seq_masked
      loss_cfg:
        task_weights: {state: 1.0}
        label_smoothing: 0.1
      early_stopping:
        metric: val_macro_f1_state
        mode: max
        patience: 8
    eval:
      metrics: [macro_f1, balanced_acc]

  gated_state_only:
    fusion: gated
    task_type: classification
    data:
      name: amucs_seq_mixed_rate
      labels_seq_path: labels/arousal_state_trend_seq.json
      label_dtype: long
      task_names: [state]
      normalize: true
      num_workers: 4
    model:
      head:
        name: multitask_seq
        task_names: [state]
        hidden_dim: 128
        num_classes: 3
        dropout: 0.1
    train:
      loss: multitask_ce_seq_masked
      loss_cfg:
        task_weights: {state: 1.0}
        label_smoothing: 0.1
      early_stopping:
        metric: val_macro_f1_state
        mode: max
        patience: 8
    eval:
      metrics: [macro_f1, balanced_acc]

  # ── 3 EFT 改进（state-only 适用版）───────────────────────

  eft_C_state_only:
    fusion: eft
    task_type: classification
    data:
      name: amucs_seq_mixed_rate
      labels_seq_path: labels/arousal_state_trend_seq.json
      label_dtype: long
      task_names: [state]
      normalize: true
      num_workers: 4
    model:
      head:
        name: multitask_seq
        task_names: [state]
        hidden_dim: 128
        num_classes: 3
        dropout: 0.1
    train:
      loss: multitask_ce_seq_masked
      loss_cfg:
        task_weights: {state: 1.0}
        label_smoothing: 0.1
      contrastive_alignment:
        enabled: true
        temperature: 0.07
        lambda_align: 0.1
        proj_dim: 128
      early_stopping:
        metric: val_macro_f1_state
        mode: max
        patience: 8
    eval:
      metrics: [macro_f1, balanced_acc]

  eft_D_state_only:
    fusion: eft
    task_type: classification
    data:
      name: amucs_seq_mixed_rate
      labels_seq_path: labels/arousal_state_trend_seq.json
      label_dtype: long
      task_names: [state]
      normalize: true
      num_workers: 4
    model:
      temporal_encoder:
        enabled: true
        scales: [1, 5, 25]
        kernel_size: 3
        dropout: 0.1
      head:
        name: multitask_seq
        task_names: [state]
        hidden_dim: 128
        num_classes: 3
        dropout: 0.1
    train:
      loss: multitask_ce_seq_masked
      loss_cfg:
        task_weights: {state: 1.0}
        label_smoothing: 0.1
      early_stopping:
        metric: val_macro_f1_state
        mode: max
        patience: 8
    eval:
      metrics: [macro_f1, balanced_acc]

  eft_CD_state_only:
    fusion: eft
    task_type: classification
    data:
      name: amucs_seq_mixed_rate
      labels_seq_path: labels/arousal_state_trend_seq.json
      label_dtype: long
      task_names: [state]
      normalize: true
      num_workers: 4
    model:
      temporal_encoder:
        enabled: true
        scales: [1, 5, 25]
        kernel_size: 3
        dropout: 0.1
      head:
        name: multitask_seq
        task_names: [state]
        hidden_dim: 128
        num_classes: 3
        dropout: 0.1
    train:
      loss: multitask_ce_seq_masked
      loss_cfg:
        task_weights: {state: 1.0}
        label_smoothing: 0.1
      contrastive_alignment:
        enabled: true
        temperature: 0.07
        lambda_align: 0.1
        proj_dim: 128
      early_stopping:
        metric: val_macro_f1_state
        mode: max
        patience: 8
