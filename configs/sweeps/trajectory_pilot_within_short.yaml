# ─────────────────────────────────────────────────────────
# Trajectory Pilot — Exp 5: Shorter horizon
#
# 和 trajectory_pilot_within_stem.yaml 的差异：
#   shared.data.post_s: 3.0             ← 预测未来 3s 而非 10s
#   tasks....model.head.out_dim: 16     ← 3.0 / 0.2 + 1 = 16
#
# 目的：如果 val_ccc 在短时窗下显著 > 0.2，说明 10s 太远是主因；
#       否则排除"预测距离"因素。
# ─────────────────────────────────────────────────────────

seeds: [0]

modalities:
  - [video]

split_modes:
  within_subject:
    split_path: splits/within_subject.json

shared:
  data:
    name: amucs_trajectory
    data_root: features/aligned
    labels_seq_path: labels/labels_arousal_seq.json
    events_path: labels/events_index.json
    split_path: splits/within_subject.json
    pre_s: 20.0
    post_s: 3.0                        # ★
    dt: 0.2
    train_stride_s: 2.0
    val_stride_s: 2.0
    test_stride_s: 1.0
    tau_s: 10.0
    normalize: true
    num_workers: 12
    within_stem_split: true
    within_stem_ratios: [0.7, 0.15, 0.15]
    modality_dir_map:
      video: video_clip
      km: km
      telem: telem
  model:
    d_model: 512
    encoders:
      video:
        name: resnet2d
        feature_dim: 768
        dropout: 0.1
        temporal_pool: none
      km:
        name: stat
        feature_dim: 25
      telem:
        name: stat_pool
        feature_dim: 109
    fusion_eft:
      name: eft
      nhead: 8
      num_layers: 4
      dim_feedforward: 1024
      dropout: 0.1
      max_seq_len: 2000
      pos_encoding_type: sinusoidal
      pooling: mean
      temporal_merge: mean
  train:
    optimizer:
      name: adamw
      lr: 5.0e-05
      weight_decay: 0.01
    scheduler:
      name: cosine
      warmup_epochs: 3
    grad_clip: 1.0
    batch_size: 256
    epochs: 40
    modality_dropout: 0.0
    ckpt_every_batches: 100
    compile: true

tasks:
  eft_trajectory_pilot_within_short:
    fusion: eft
    task_type: regression
    data:
      name: amucs_trajectory
    model:
      head:
        name: regression
        hidden_dim: 256
        out_dim: 16                    # ★ 3.0 / 0.2 + 1 = 16
        dropout: 0.1
    train:
      loss: mse
      early_stopping:
        metric: val_mse
        mode: min
        patience: 8
    eval:
      metrics: [mse, ccc]
