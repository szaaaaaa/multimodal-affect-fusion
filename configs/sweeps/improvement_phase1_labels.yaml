# ─────────────────────────────────────────────────────────
# Phase 1: Label Quality Optimization
# 阶段1：标签质量优化 — 标签平滑 + 延迟校正
#
# 在 arousal_reg_trend_multitask 基础上，对比不同标签处理策略。
# 只跑 VKT（三模态），确认最佳标签方案后再推广到全模态。
#
# 前置步骤（需先手动运行）：
#   python scripts/smooth_labels.py --sigma 1 2 3
#   （生成 labels/arousal_reg_trend_seq_smooth_s{1,2,3}.json）
#
# Usage:
#   python scripts/run_experiment.py \
#       --sweep configs/sweeps/improvement_phase1_labels.yaml \
#       --data_root /content/drive/MyDrive/AmuCS_experiment/features/aligned \
#       --labels_root /content/drive/MyDrive/AmuCS_experiment/labels \
#       --splits_root /content/drive/MyDrive/AmuCS_experiment/splits \
#       --runs_root runs/improvement_phase1
# ─────────────────────────────────────────────────────────

seeds: [0, 1, 2]

# 只跑三模态，快速对比标签方案
modalities:
  - [video, km, telem]

shared:
  data:
    data_root: features/aligned
    split_path: splits/session_tvt.json
    seq_len: 600
    train_stride: 300
    val_stride: 300
    test_stride: 300
    normalize: false
    num_workers: 12
  model:
    d_model: 512
    encoders:
      video: {name: resnet2d, feature_dim: 768, dropout: 0.1, temporal_pool: none}
      km:    {name: stat, feature_dim: 25}
      telem: {name: stat_pool, feature_dim: 109}
    fusion_lft:
      name: lft
      nhead: 8
      num_layers: 2
      dim_feedforward: 512
      dropout: 0.1
      max_seq_len: 2000
      pos_encoding_type: sinusoidal
      pooling: mean
      input_token_merge: linear
      temporal_merge: none
  train:
    optimizer: {name: adamw, lr: 5.0e-05, weight_decay: 0.01}
    batch_size: 256
    epochs: 40
    modality_dropout: 0.0
    ckpt_every_batches: 100
    compile: true

# ── 多任务回归+趋势的公共模板 ────────────────────────────
_task_template: &multitask_arousal_trend
  fusion: lft
  task_type: multitask
  data:
    name: amucs_seq_multitask
    task_names: [arousal, trend]
    task_label_dtypes: {arousal: float, trend: long}
    normalize: true
    num_workers: 16
  model:
    head:
      name: multitask_mixed_seq
      task_heads:
        arousal: {type: regression, hidden_dim: 128, out_dim: 1, dropout: 0.1}
        trend: {type: classification, hidden_dim: 128, num_classes: 3, dropout: 0.1}
  train:
    loss: multitask_mixed_seq_loss
    loss_cfg:
      task_weights: {arousal: 1.0, trend: 1.0}
      task_types: {arousal: regression, trend: classification}
    early_stopping: {metric: val_score_mixed, mode: max, patience: 5}
  eval:
    task_metrics:
      arousal: [ccc, rmse]
      trend: [macro_f1, balanced_acc]
    multitask_metric_weights: {ccc_arousal: 0.5, macro_f1_trend: 0.5}

tasks:

  # 对照组：原始标签
  baseline_original:
    <<: *multitask_arousal_trend
    data:
      name: amucs_seq_multitask
      labels_seq_path: labels/arousal_reg_trend_seq.json
      task_names: [arousal, trend]
      task_label_dtypes: {arousal: float, trend: long}
      normalize: true
      num_workers: 16

  # 标签平滑 sigma=1 (0.2s @5Hz)
  smooth_s1:
    <<: *multitask_arousal_trend
    data:
      name: amucs_seq_multitask
      labels_seq_path: labels/arousal_reg_trend_seq_smooth_s1.json
      task_names: [arousal, trend]
      task_label_dtypes: {arousal: float, trend: long}
      normalize: true
      num_workers: 16

  # 标签平滑 sigma=2 (0.4s @5Hz)
  smooth_s2:
    <<: *multitask_arousal_trend
    data:
      name: amucs_seq_multitask
      labels_seq_path: labels/arousal_reg_trend_seq_smooth_s2.json
      task_names: [arousal, trend]
      task_label_dtypes: {arousal: float, trend: long}
      normalize: true
      num_workers: 16

  # 标签平滑 sigma=3 (0.6s @5Hz)
  smooth_s3:
    <<: *multitask_arousal_trend
    data:
      name: amucs_seq_multitask
      labels_seq_path: labels/arousal_reg_trend_seq_smooth_s3.json
      task_names: [arousal, trend]
      task_label_dtypes: {arousal: float, trend: long}
      normalize: true
      num_workers: 16

  # 标签平滑 sigma=5 (1.0s @5Hz)
  smooth_s5:
    <<: *multitask_arousal_trend
    data:
      name: amucs_seq_multitask
      labels_seq_path: labels/arousal_reg_trend_seq_smooth_s5.json
      task_names: [arousal, trend]
      task_label_dtypes: {arousal: float, trend: long}
      normalize: true
      num_workers: 16
