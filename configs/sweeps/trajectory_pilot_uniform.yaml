# ─────────────────────────────────────────────────────────
# Trajectory Pilot — Uniform sampling ablation
#
# 唯一差异 vs trajectory_pilot.yaml：
#   shared.data.event_weighted: false  ← 关闭事件加权采样
#
# 目的：验证"train event-weighted × val uniform 分布不对称"是否是
#       val_mse 无法下降到 epoch 2 以下的根因。
#
# 仅跑 single_video / seed0 / 1 run（最小验证）。
# ─────────────────────────────────────────────────────────

seeds: [0]

modalities:
  - [video]

split_modes:
  cross_subject:
    split_path: splits/session_tvt.json

shared:
  data:
    name: amucs_trajectory
    data_root: features/aligned
    labels_seq_path: labels/labels_arousal_seq.json
    events_path: labels/events_index.json
    split_path: splits/session_tvt.json
    pre_s: 20.0
    post_s: 10.0
    dt: 0.2
    train_stride_s: 2.0
    val_stride_s: 2.0
    test_stride_s: 1.0
    tau_s: 10.0
    normalize: true
    num_workers: 12
    event_weighted: false           # ★ 本 sweep 的唯一差异
    modality_dir_map:
      video: video_clip
      km: km
      telem: telem
  model:
    d_model: 512
    encoders:
      video:
        name: resnet2d
        feature_dim: 768
        dropout: 0.1
        temporal_pool: none
      km:
        name: stat
        feature_dim: 25
      telem:
        name: stat_pool
        feature_dim: 109
    fusion_eft:
      name: eft
      nhead: 8
      num_layers: 4
      dim_feedforward: 1024
      dropout: 0.1
      max_seq_len: 2000
      pos_encoding_type: sinusoidal
      pooling: mean
      temporal_merge: mean
  train:
    optimizer:
      name: adamw
      lr: 5.0e-05
      weight_decay: 0.01
    scheduler:
      name: cosine
      warmup_epochs: 3
    grad_clip: 1.0
    batch_size: 256
    epochs: 40
    modality_dropout: 0.0
    ckpt_every_batches: 100
    compile: true

tasks:
  eft_trajectory_pilot_uniform:
    fusion: eft
    task_type: regression
    data:
      name: amucs_trajectory
    model:
      head:
        name: regression
        hidden_dim: 256
        out_dim: 51
        dropout: 0.1
    train:
      loss: mse
      early_stopping:
        metric: val_mse
        mode: min
        patience: 8
    eval:
      metrics: [mse, ccc]
