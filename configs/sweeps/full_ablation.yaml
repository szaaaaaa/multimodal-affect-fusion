  late_state_trend:
    fusion: late
    task_type: classification
    data:
      name: amucs_seq_multitask
      labels_seq_path: labels/arousal_state_trend_seq.json
      label_dtype: long
      task_names: [state, trend]
      normalize: true
      num_workers: 16
    model:
      head:
        name: multitask_seq
        task_names: [state, trend]
        hidden_dim: 128
        num_classes: 3
        dropout: 0.1
    train:
      loss: multitask_ce_seq_masked
      loss_cfg:
        task_weights: {state: 1.0, trend: 1.0}
        label_smoothing: 0.1
      early_stopping:
        metric: val_f1_mean
        mode: max
        patience: 5
