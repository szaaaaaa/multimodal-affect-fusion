# ─────────────────────────────────────────────────────────
# Ablation sweep — state+trend multitask only × 7 modality combos × 3 seeds
# 仅保留 E6: 状态分类 + 趋势预测 (LFT fusion)
#
# Usage:
#   python scripts/run_experiment.py --sweep configs/sweeps/full_ablation.yaml \
#       --data_root /content/drive/MyDrive/AmuCS_experiment/features/aligned \
#       --labels_root /content/drive/MyDrive/AmuCS_experiment/labels \
#       --splits_root /content/drive/MyDrive/AmuCS_experiment/splits
# ─────────────────────────────────────────────────────────

seeds: [0, 1, 2]

modalities:
  - [video]
  - [km]
  - [telem]
  - [video, km]
  - [video, telem]
  - [km, telem]
  - [video, km, telem]

# ── 数据集划分模式 ────────────────────────────────────────
# 每个 mode 的 data 字段会 deep_merge 到 shared.data 中
split_modes:
  cross_subject:
    split_path: splits/session_tvt.json
  within_subject:
    split_path: splits/within_subject.json
    temporal_split_ratios:
      train: [0.0, 0.6]
      val: [0.6, 0.8]
      test: [0.8, 1.0]

# ── 所有 task 共享的参数 ──────────────────────────────────
shared:
  data:
    data_root: features/aligned           # CLI --data_root 覆盖
    split_path: splits/session_tvt.json   # 默认值，被 split_modes 覆盖
    seq_len: 600
    train_stride: 300
    val_stride: 300
    test_stride: 300
    normalize: false
    num_workers: 12
    modality_dir_map:
      video: video_clip
    win_lens:
      video: 24
      km: 300
  model:
    d_model: 512
    encoders:
      video:
        name: resnet2d
        feature_dim: 768
        dropout: 0.1
        temporal_pool: none
      km:
        name: stat
        feature_dim: 25
      telem:
        name: stat_pool
        feature_dim: 109
    fusion_late:
      name: late
      nhead: 8
      num_layers: 2
      dim_feedforward: 512
      dropout: 0.1
      max_seq_len: 2000
      pos_encoding_type: sinusoidal
      pooling: mean
    fusion_early:
      name: early
      nhead: 8
      num_layers: 2
      dim_feedforward: 512
      dropout: 0.1
      max_seq_len: 2000
      pos_encoding_type: sinusoidal
      pooling: mean
    fusion_lft:
      name: lft
      nhead: 8
      num_layers: 2
      dim_feedforward: 512
      dropout: 0.1
      max_seq_len: 2000
      pos_encoding_type: sinusoidal
      pooling: mean
      input_token_merge: linear
      temporal_merge: none
    fusion_cma:
      name: cma
      nhead: 8
      cm_layers: 4
      sa_layers: 2
      dim_feedforward: 1024
      dropout: 0.1
      anchor_modality: video
      max_seq_len: 2000
      pos_encoding_type: sinusoidal
      pooling: mean
      temporal_merge: mean
    fusion_gated:
      name: gated
      gate_hidden_dim: 256
      refine_layers: 1
      refine_nhead: 8
      refine_dim_feedforward: 512
      dropout: 0.1
      max_seq_len: 2000
      pooling: mean
  train:
    optimizer:
      name: adamw
      lr: 5.0e-05
      weight_decay: 0.01
    scheduler:
      name: cosine
      warmup_epochs: 3
    grad_clip: 1.0
    batch_size: 256
    epochs: 40
    modality_dropout: 0.0
    ckpt_every_batches: 100
    compile: true

