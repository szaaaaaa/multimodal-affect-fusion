# ─────────────────────────────────────────────────────────
# Path B Pilot 补 seed: STATE-ONLY 三分类 seeds [1, 2]
#
# 目的：补 seed 1, 2 两个 run，与原 pilot (seed 0) 合并成 3-seed 均值，
# 验证 state-only vs multitask 的 Δ test_macro_f1_state 是否稳定 > 0.012。
#
# 原 pilot (seed 0) 结果：
#   state-only test_macro_f1_state = 0.4061
#   multitask  test_macro_f1_state = 0.3917  (3-seed mean = 0.3924, std = 0.001)
#   Δ (single seed)               = +0.0144  (踩 0.015 阈值)
#
# Pilot 范围：1 modality × 1 split × 2 seed = 2 run
#
# 注意：runs_root 与原 pilot 共用 (pathB_state_only_pilot)，
# task 名同为 `cma_pathB_state_only`，这样 seed 0/1/2 三个目录并列，
# Cell 4 一次 glob 三个 metrics.json 计算 3-seed mean ± std。
#
# Usage (Colab):
#   python -u scripts/run_experiment.py \
#     --sweep configs/sweeps/pathB_cma_state_only_pilot_seeds12.yaml \
#     --workers 1 \
#     --data_root   /content/drive/MyDrive/AmuCS_experiment/features/aligned \
#     --labels_root /content/drive/MyDrive/AmuCS_experiment/labels \
#     --splits_root /content/drive/MyDrive/AmuCS_experiment/splits \
#     --runs_root   /content/drive/MyDrive/AmuCS_experiment/runs/pathB_state_only_pilot
# ─────────────────────────────────────────────────────────

seeds: [1, 2]

modalities:
  - [video, km_event, telem_60hz]

split_modes:
  cross_subject:
    split_path: splits/session_tvt.json

shared:
  data:
    name: amucs_seq_mixed_rate
    data_root: features/aligned
    split_path: splits/session_tvt.json
    seq_len_video_frames: 600
    train_stride_video_frames: 300
    val_stride_video_frames: 300
    test_stride_video_frames: 300
    normalize: true
    num_workers: 8
    max_events_per_window: 2048
    modality_dir_map:
      video: video_clip
      km_event: km_event
      telem_60hz: telem_60hz
  model:
    d_model: 512
    encoders:
      video:
        name: resnet2d
        feature_dim: 768
        dropout: 0.1
        temporal_pool: none
      km_event:
        name: event_token
        vocab_size: 256
        num_layers: 2
        nhead: 4
        dropout: 0.1
        target_T_v: 600
      telem_60hz:
        name: stream_60hz
        feature_dim: 23
        tcn_layers: 3
        kernel: 5
        dropout: 0.1
        downsample_stride: 12
    fusion_cma:
      name: cma
      nhead: 8
      cm_layers: 4
      sa_layers: 2
      dim_feedforward: 1024
      dropout: 0.1
      anchor_modality: video
      max_seq_len: 2000
      pos_encoding_type: sinusoidal
      pooling: mean
      temporal_merge: mean
  train:
    optimizer:
      name: adamw
      lr: 5.0e-05
      weight_decay: 0.01
    scheduler:
      name: cosine
      warmup_epochs: 3
    grad_clip: 1.0
    batch_size: 64
    epochs: 40
    modality_dropout: 0.0
    ckpt_every_batches: 100
    compile: false

tasks:
  cma_pathB_state_only:
    fusion: cma
    task_type: classification
    data:
      name: amucs_seq_mixed_rate
      labels_seq_path: labels/arousal_state_trend_seq.json
      label_dtype: long
      task_names: [state]
      normalize: true
      num_workers: 8
    model:
      head:
        name: multitask_seq
        task_names: [state]
        hidden_dim: 128
        num_classes: 3
        dropout: 0.1
    train:
      loss: multitask_ce_seq_masked
      loss_cfg:
        task_weights: {state: 1.0}
        label_smoothing: 0.1
      early_stopping:
        metric: val_macro_f1_state
        mode: max
        patience: 8
    eval:
      metrics: [macro_f1, balanced_acc]
