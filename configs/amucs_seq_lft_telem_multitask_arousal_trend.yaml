_base_: ./experiments/telem_lft_aligned_seq.yaml

task_type: multitask

data:
  name: amucs_seq_multitask
  modalities: [telem]
  labels_seq_path: labels/arousal_reg_trend_seq.json
  task_names: [arousal, trend]
  task_label_dtypes:
    arousal: float
    trend: long

model:
  head:
    name: multitask_mixed_seq
    task_heads:
      arousal:
        type: regression
        hidden_dim: 128
        out_dim: 1
        dropout: 0.1
      trend:
        type: classification
        hidden_dim: 128
        num_classes: 3
        dropout: 0.1

train:
  loss: multitask_mixed_seq_loss
  loss_cfg:
    task_weights:
      arousal: 1.0
      trend: 1.0
    task_types:
      arousal: regression
      trend: classification
  early_stopping:
    metric: val_score_mixed
    mode: max
    patience: 5

eval:
  task_metrics:
    arousal: [ccc, rmse]
    trend: [macro_f1, balanced_acc]
  multitask_metric_weights:
    ccc_arousal: 0.5
    macro_f1_trend: 0.5
