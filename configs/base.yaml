# ─────────────────────────────────────────────────────────
# Base configuration — global defaults
# 基础配置 — 全局默认值
#
# Experiments inherit from this via _base_: ../base.yaml
# ─────────────────────────────────────────────────────────

data:
  name: amucs
  modalities: [video, km]
  data_root: data/features/amucs
  labels_path: G:/我的云端硬盘/AmuCS_experiment/labels/labels_arousal.json
  split_path: data/splits/multimodal_split.json
  normalize: true
  modality_dir_map:
    video: video_clip
  win_lens:
    video: 24
    km: 300

model:
  d_model: 512
  encoders:
    video:
      name: resnet2d
      feature_dim: 768
      dropout: 0.1
      temporal_pool: none
    km:
      name: stat
      feature_dim: 25
  fusion:
    name: lft
    nhead: 8
    num_layers: 4
    dim_feedforward: 1024
    dropout: 0.1
    max_seq_len: 2000
    pos_encoding_type: sinusoidal
    pooling: mean
  head:
    name: regression
    hidden_dim: 128
    out_dim: 1
    dropout: 0.1

train:
  loss: smooth_l1
  optimizer:
    name: adamw
    lr: 1.0e-4
    weight_decay: 0.01
  batch_size: 8
  epochs: 50
  seed: 42
  modality_dropout: 0.0
  early_stopping:
    patience: 10
    metric: val_ccc
    mode: max

eval:
  metrics: [ccc, rmse]

device: auto
runs_dir: runs

