# Stress level classification: KM + Telem
_base_: ./video_km_telem_aligned_seq.yaml

task_type: classification

data:
  modalities: [km, telem]
  labels_seq_path: G:/我的云端硬盘/AmuCS_experiment/labels/labels_stress_level.json
  label_dtype: long
  normalize: false

model:
  head:
    name: classification_seq
    num_classes: 3
    hidden_dim: 128
    dropout: 0.1

train:
  loss: ce_seq_masked
  early_stopping:
    metric: val_macro_f1
    mode: max

eval:
  metrics: [macro_f1, balanced_acc]
