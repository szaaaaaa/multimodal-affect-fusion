# Strict temporal arousal regression on aligned video+km features
_base_: ../base.yaml

data:
  name: amucs_seq
  modalities: [video, km]
  data_root: data/features_aligned/amucs_trial
  labels_seq_path: data/labels_arousal_seq.json
  split_path: data/splits/multimodal_split.json
  seq_len: 600
  train_stride: 300
  normalize: true

model:
  fusion:
    name: lft
    input_token_merge: linear
    temporal_merge: none
    nhead: 8
    num_layers: 2
    dim_feedforward: 512
    dropout: 0.1
    max_seq_len: 1000
    pos_encoding_type: sinusoidal
    pooling: mean
  head:
    name: regression_seq
    hidden_dim: 128
    out_dim: 1
    dropout: 0.1

train:
  loss: mse_seq_masked
  ckpt_every_batches: 100
  epochs: 40
  optimizer:
    name: adamw
    lr: 1.0e-4
    weight_decay: 0.01
  early_stopping:
    patience: 5
    metric: val_rmse
    mode: min

eval:
  metrics: [ccc, rmse]
